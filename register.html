<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta — NutriTech</title>
  <link rel="icon" type="image/png" href="assets/logo-nutritech.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Akatab:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <div class="auth-layout">
    <aside class="auth-visual" aria-hidden="true">
      <div class="auth-visual__overlay"></div>
      <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800&h=1000&fit=crop&q=80" alt="" class="auth-visual__img">
      <div class="auth-visual__content">
        <a href="index.html" class="auth-visual__logo">
          <img src="assets/logo-nutritech.png" alt="NutriTech" width="160" height="56">
        </a>
        <blockquote>
          <p>"En 2 minutos tenía mi perfil listo y recomendaciones para toda la semana. Increíble."</p>
          <cite>— Pablo, Estudiante de Derecho</cite>
        </blockquote>
      </div>
    </aside>

    <main class="auth-main">
      <a href="index.html" class="auth-back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Volver al inicio
      </a>

      <div class="auth-card">
        <div class="auth-card__header">
          <img src="assets/logo-nutritech.png" alt="NutriTech" class="auth-card__logo" width="140" height="48">
          <h1>Crea tu cuenta gratis</h1>
          <p>Empieza a gestionar tu nutrición en menos de 2 minutos.</p>
        </div>

        <form class="auth-form" id="registerForm" novalidate>
          <div class="form-row form-row--2">
            <div class="form-group">
              <label for="firstName">Nombre</label>
              <input type="text" id="firstName" name="firstName" placeholder="María" required autocomplete="given-name">
            </div>
            <div class="form-group">
              <label for="lastName">Apellidos</label>
              <input type="text" id="lastName" name="lastName" placeholder="González" required autocomplete="family-name">
            </div>
          </div>
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="tu@universidad.edu" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="university">Universidad</label>
            <input type="text" id="university" name="university" placeholder="Ej. Universidad Complutense de Madrid" required>
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="form-group__password">
              <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required autocomplete="new-password" minlength="8">
              <button type="button" class="password-toggle" aria-label="Mostrar contraseña" data-target="password">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <label class="checkbox-label checkbox-label--block">
            <input type="checkbox" name="terms" required>
            <span>Acepto los <a href="#">Términos de uso</a> y la <a href="#">Política de privacidad</a></span>
          </label>
          <button type="submit" class="btn btn--primary btn--full">Crear cuenta</button>
        </form>

        <div class="auth-divider"><span>o regístrate con</span></div>

        <div class="auth-social">
          <button type="button" class="btn btn--social">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
        </div>

        <p class="auth-footer-text">
          ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </p>
      </div>
    </main>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
